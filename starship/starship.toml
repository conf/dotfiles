# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = false

# todo: 
# - git status changes
# - k8s colors

format = """
$directory\
$git_branch\
$git_state\
$git_status\
$fill \
$kubernetes\
$cmd_duration\
$time\
$line_break\
$character\
"""

#right_format = "$cmd_duration$time"

[time]
disabled = false
format = " [$time]($style) "
style = "bright-green"

[aws]
disabled = true
style = 'bold yellow'
symbol = '🅰 '
[aws.region_aliases]
eu-west-1 = 'eu'

# Replace the '❯' symbol in the prompt with ''
[character] # The name of the module we are configuring is 'character'
#success_symbol = '[](bold red)' # The 'success_symbol' segment is being set to '' with the color 'bold green'
success_symbol = "[](red)"
error_symbol = "[✖](red)"

[cmd_duration]
format = 'took [$duration]($style) '
style = "yellow"
min_time = 1000
show_milliseconds = true

[directory]
style = "blue"

[docker_context]
disabled = true

[fill]
symbol = '─'

[git_branch]
symbol = '🌱 '
format = "[$symbol$branch]($style)"
style = "purple"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style) "
style = "cyan"
untracked = ""
# conflicted = ""
# modified = ""
# staged = ""
# renamed = ""
# deleted = ""
stashed = "≡"

# [git_status]
# format = "[($ahead_behind$stashed)]($style) "
# style = "cyan"
# stashed = "≡"

# [custom.git_status_dirty]
# when = 'test -n "$(git status --porcelain --untracked-files=no)"'
# symbol = "*"
# style = "red"
# format="[$symbol]($style) "
# shell = ["bash", "--norc", "--noprofile"]

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[gcloud]
disabled = true

[kubernetes]
format = '[$symbol$context(/$namespace)]($style) '
disabled = false
style = 'red'

[[kubernetes.contexts]]
context_pattern = "prod"
style = "bold red"

[[kubernetes.contexts]]
context_pattern = "infra"
style = "bold blue"

[[kubernetes.contexts]]
context_pattern = "(data|pp|poc|docker-desktop)"
style = "green"

[nodejs]
disabled = true

[package]
disabled = true

[php]
disabled = true

[python]
disabled = true

[ruby]
disabled = true

